# Nginx vhost para o IFEM/Subfinanciados — proxy reverso para o container Docker.
# Instalar em: /etc/nginx/sites-available/ifem  (e linkar em sites-enabled/).
#
# ⚠️ Ativar SOMENTE quando o domínio estiver pronto (registro.br/Cloudflare apontando para o droplet).
# Até lá, a validação é feita por túnel SSH (ssh -L 8003:localhost:8003).
#
# Após apontar o DNS:
#   1) ajustar server_name abaixo;
#   2) ln -s /etc/nginx/sites-available/ifem /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx;
#   3) certbot --nginx -d ifem.fnp.org.br   (gera TLS e reescreve este arquivo para 443);
#   4) no .env do droplet: SECURE_SSL_REDIRECT=True e acrescentar o domínio em ALLOWED_HOSTS/CSRF_TRUSTED_ORIGINS;
#   5) adicionar em config/settings.py (quando publicar):
#        SECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')

server {
    listen 80;
    server_name ifem.fnp.org.br;  # AJUSTAR quando o domínio existir

    # O container (WhiteNoise) já serve /static/ e /media/. Proxy de tudo:
    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Limite de upload coerente com o Django (ajustar se necessário).
    client_max_body_size 10m;
}
